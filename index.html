<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading page</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap');

    * {
        margin: 0;
    }
        body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(
        135deg,
        #030111,
        #0a1030,
        #051a25
    );
    animation: fadeOut 9.5s ease forwards;
}

@keyframes fadeOut {
    from {
        opacity: 1;
    }

    to {
        opacity: 0;
    }
}
    .loaders {
        display: flex;
        flex-direction: row;
        margin-top: 40px;
        gap: 10px;
    }
    .dots {
        height: 10px;
        width: 10px;
        border-radius: 50%;
        animation: bounce .6s infinite alternate;
        background: #88cd39;
    }
    .dots:nth-child(2) {
        animation-delay: .2s;
    }

.dots:nth-child(3) {
        animation-delay: .4s;
    }
    @keyframes bounce {
        from {
transform: translateY(0);
opacity: .5;
        }
     to {
        transform: translateY(-20px);
        opacity: 1;
     }   
    }
</style>
<body>


    <div class="loaders">
        <span class="dots"></span>
         <span class="dots"></span>
         <span class="dots"></span>
    </div>
<script>
    setTimeout(() => {
        window.location.href = "calender.html";
    }, 3000);
</script>
</body>
</html>
